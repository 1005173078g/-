name: news-lianbo-wecom-daily

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
      WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve China date
        id: date
        run: echo "today=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"

      - name: Generate daily page
        run: python -m src.news_lianbo_daily.action_daily --date "${{ steps.date.outputs.today }}" --skip-wecom

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Commit and push daily page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "data/${{ steps.date.outputs.today }}.json" "daily/${{ steps.date.outputs.today }}.html"
          if git diff --cached --quiet; then
            echo "没有需要提交的日报变化"
          else
            git commit -m "生成${{ steps.date.outputs.today }}新闻联播日报"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Pages
        uses: actions/deploy-pages@v4

      - name: Send WeCom success message
        run: python -m src.news_lianbo_daily.cli --date "${{ steps.date.outputs.today }}" --send-wecom

      - name: Send WeCom failure message
        if: failure()
        run: >
          python -c "import os;
          from src.news_lianbo_daily.action_daily import markdown_failure_payload;
          from src.news_lianbo_daily.wecom import send_wecom_markdown;
          webhook=os.environ.get('WECOM_WEBHOOK_URL');
          webhook and send_wecom_markdown(webhook, markdown_failure_payload('GitHub Actions', '自动生成或发布失败，请查看 Actions 日志。'))"
